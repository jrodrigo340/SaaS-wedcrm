wedcrm:
    jwt:
        secret: "suaChaveSecretaMuitoGrandeComPeloMenos32CaracteresParaHS512"
        access-token-expiration: 900000   # 15 minutos
        refresh-token-expiration: 604800000  # 7 dias

    spring:
        datasource:
        url: jdbc:postgresql://localhost:5432/wedcrm
        username: postgres
        password: 123456
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration

server:
    port: 8080